# PT-TKF —— Cloudflare Pages 本地开发与绑定参考
# 生产环境的 D1/密钥绑定请在 Cloudflare 控制台（Pages → Settings → Functions）配置，
# 此处主要用于 `wrangler pages dev` 本地联调。
name = "pt-tkf"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

# D1 数据库绑定（单一数据库承载：内容/配置/图片/留言）
[[d1_databases]]
binding = "TKF_DB"
database_name = "pt-tkf-db"
database_id = "ebe40f14-c671-4675-87e2-d59d66b0722a"
# 本地开发用本地数据库：wrangler pages dev 会自动使用本地 D1；远程建表见 db/schema.sql

# R2 桶绑定（存放上传图片，替代 D1 存 base64）
# 本地调试用：需先 `wrangler r2 bucket create pt-tkf-assets`；生产在控制台绑定同名桶。
[[r2_buckets]]
binding = "TKF_BUCKET"
bucket_name = "pt-tkf-assets"

# 非敏感环境变量（敏感项请用 secret：见 CLOUDFLARE_DEPLOY.md）
[vars]
TRANSLATE_PROVIDER = "google"
